services:
  mcq-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcq-tracker
    ports:
      - "3000:3000"
    volumes:
      # Persist the SQLite database outside the container
      - mcq-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/mcq.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mcq-data:
    driver: local
